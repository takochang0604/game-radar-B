<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊戲產品競爭力分析</title>
  <meta name="description" content="非博弈類手機遊戲排行追蹤與黑馬偵測工具">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="logo">🎮</span>
        <span>遊戲產品競爭力分析</span>
      </div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span id="statusText">載入中...</span>
      </div>
    </div>
  </header>

  <main class="main-container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">今日新黑馬</div><div class="stat-value" id="statNewDh">0</div><div class="stat-sub">匹（新進榜）</div></div>
      <div class="stat-card"><div class="stat-label">資料區間</div><div class="stat-value" id="statSnapshots" style="font-size:16px;letter-spacing:-0.5px">—</div><div class="stat-sub" id="statSnapshotsSub">載入中</div></div>
      <div class="stat-card"><div class="stat-label">今日更新</div><div class="stat-value" id="statApps">0</div><div class="stat-sub">款遊戲</div></div>
      <div class="stat-card"><div class="stat-label">偵測黑馬</div><div class="stat-value" id="statDarkhorses">0</div><div class="stat-sub">匹</div></div>
    </div>

  <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="darkhorse">🐴 黑馬偵測</div>
      <div class="tab" data-tab="tracked">📌 追蹤中<span class="tab-badge" id="trackedBadge"></span></div>
      <div class="tab" data-tab="rankings">📊 排行榜</div>
    </div>

    <!-- Tab: 黑馬偵測 -->
    <div class="tab-content active" id="tab-darkhorse">
      <!-- ▼ 黑馬專用篩選器 -->
      <div class="tab-filters" id="dhFilters">
        <div class="filter-row">
          <label>市場</label>
          <div class="pill-group" id="dhMarketPills"></div>
        </div>
        <div class="filter-row">
          <label>狀態</label>
          <div class="pill-group">
            <button class="pill active" data-dh-report="all" onclick="setDhReportFilter('all')">全部</button>
            <button class="pill" data-dh-report="reported" onclick="setDhReportFilter('reported')">📄 已評測</button>
            <button class="pill" data-dh-report="unreported" onclick="setDhReportFilter('unreported')">🔍 未評測</button>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">
          <div class="section-title"><span class="icon">🐴</span> 黑馬遊戲<span class="section-badge" id="dhCount">0</span><span class="score-info-btn" id="scoreInfoBtn" title="信心分數說明"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align:-2px"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="4.5" r="0.8" fill="currentColor"/></svg></span></div>
          <div class="section-actions">
            <input type="search" id="dhSearch" class="dh-search" placeholder="🔍 搜尋遊戲名稱..." oninput="renderDarkhorses()">
          </div>
        </div>
        <div id="darkhorseGrid" class="darkhorse-grid">
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>尚無黑馬資料。請先執行 <code>npm run daily</code> 開始收集排行數據，累積數天後黑馬偵測將自動啟動。</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: 排行榜 -->
    <div class="tab-content" id="tab-rankings">
      <!-- ▼ 排行榜專用篩選器 -->
      <div class="tab-filters" id="rankFilters">
        <div class="filter-row">
          <label>市場</label>
          <div class="pill-group" id="rankMarketPills"></div>
        </div>
        <div class="filter-row">
          <label>平台</label>
          <div class="pill-group" id="rankPlatformPills"></div>
        </div>
        <div class="filter-row">
          <label>排行</label>
          <div class="pill-group" id="rankChartPills">
            <button class="pill active" data-chart="topfree">免費下載</button>
            <button class="pill" data-chart="grossing">營收排行</button>
          </div>
        </div>
        <div class="filter-row" style="margin-left:auto;">
          <label>日期</label>
          <div class="date-selector">
            <button class="pill" id="btnPrevDate" title="前一天">◀</button>
            <select id="dateSelect" class="date-select"></select>
            <button class="pill" id="btnNextDate" title="後一天">▶</button>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">
          <div class="section-title"><span class="icon">📊</span> 今日排行</div>
          <div class="section-actions">
            <input type="search" id="rankSearch" class="dh-search" placeholder="🔍 搜尋遊戲名稱..." oninput="filterRankings()">
          </div>
        </div>
        <div class="rankings-table-wrap">
          <table class="rankings-table" id="rankingsTable">
            <thead>
              <tr>
                <th>排名</th><th>變化</th><th>遊戲</th><th>分類</th><th>評分</th><th>上架日期</th><th>平台</th>
              </tr>
            </thead>
            <tbody id="rankingsBody">
              <tr><td colspan="7"><div class="empty-state"><div class="icon">📊</div><p>尚無排行資料</p></div></td></tr>
            </tbody>
          </table>
        </div>
        <p class="data-source-note" style="margin:8px 0 0;font-size:11px;color:var(--text-muted);opacity:0.7;">📡 資料來源：Google Play / App Store 公開排行 API（非商業資料庫，排名與 AppMagic 等商業工具可能有些許差異）</p>
      </div>
    </div>

    <!-- Tab: 追蹤中 -->
    <div class="tab-content" id="tab-tracked">
      <!-- ▼ 追蹤專用篩選器 -->
      <div class="tab-filters" id="trackedFilters">
        <div class="filter-row">
          <label>市場</label>
          <div class="pill-group" id="trackedMarketPills"></div>
        </div>
        <div class="filter-row">
          <label>狀態</label>
          <div class="pill-group">
            <button class="pill active" data-tracked-report="all" onclick="setTrackedReportFilter('all')">全部</button>
            <button class="pill" data-tracked-report="reported" onclick="setTrackedReportFilter('reported')">📄 已評測</button>
            <button class="pill" data-tracked-report="unreported" onclick="setTrackedReportFilter('unreported')">🔍 未評測</button>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">
          <div class="section-title"><span class="icon">📌</span> 追蹤中的黑馬<span class="section-badge" id="trackedCount">0</span></div>
          <div class="section-actions">
            <input type="search" id="trackedSearch" class="dh-search" placeholder="🔍 搜尋遊戲名稱..." oninput="renderTracked()">
          </div>
        </div>
        <div id="trackedGrid" class="darkhorse-grid">
          <div class="empty-state">
            <div class="icon">📌</div>
            <p>尚未追蹤任何黑馬。<br>在黑馬卡片上點擊 📌 即可追蹤。</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Analysis Modal -->
  <div class="modal-overlay" id="analysisModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
