# B 版（測試版）每日自動排程：抓排行榜 → 新算法偵測黑馬 → 上傳 Firebase (gameAnalysis-dev)
# 台灣時間 19:00 (UTC 11:00) 執行
#
# 注意：GitHub Actions 的 scheduled cron 不保證準時，
#       美洲晚高峰時段 (UTC 11:00-15:00) 延遲常見 1-2 小時。
#       若希望結果「準時 19:00 出現」，把這個 cron 改早 (例如 UTC 8:00 = 台灣 16:00)。
#
# 需要設定的 GitHub Secret：
#   GOOGLE_CREDENTIALS_JSON — google-credentials.json 的完整 JSON 內容

name: Daily Pipeline (B版)

on:
  schedule:
    # UTC 11:00 = 台灣時間 19:00
    - cron: '0 11 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # 從 GitHub Secret 寫入 Firebase 憑證
      - name: Write Firebase credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google-credentials.json

      # Step 1: 抓取排行榜快照
      - name: Fetch rankings
        run: node scripts/fetch-rankings.js

      # Step 2: 用新算法偵測黑馬
      - name: Detect darkhorses
        run: node scripts/detect-darkhorse.js

      # Step 3: 上傳到 Firebase (gameAnalysis-dev)
      - name: Upload to Firebase
        run: node scripts/upload-to-firebase.js

      # 將新資料 commit 回 repo
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push

      # 清除憑證檔
      - name: Cleanup credentials
        if: always()
        run: rm -f google-credentials.json
